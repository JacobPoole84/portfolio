<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="summaryBg" x1="120" y1="80" x2="1100" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1B2A" />
      <stop offset="0.5" stop-color="#1A3A52" />
      <stop offset="1" stop-color="#16365D" />
    </linearGradient>
    <linearGradient id="summaryPanel" x1="220" y1="170" x2="980" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1C2A3E" stop-opacity="0.9" />
      <stop offset="1" stop-color="#0F1B28" stop-opacity="0.85" />
    </linearGradient>
    <linearGradient id="summaryAccent" x1="320" y1="640" x2="900" y2="360" gradientUnits="userSpaceOnUse">
