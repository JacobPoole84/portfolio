      <feColorMatrix type="matrix" values="0 0 0 0 0.02 0 0 0 0 0.06 0 0 0 0 0.2 0 0 0 0.45 0" />
      <feBlend in2="SourceGraphic" mode="normal" />
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#summaryBg)" />

